name: smart_spend
description: "AI-Powered Expense Tracker with Receipt Scanning & Spending Insights"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Local Storage
  hive_ce: ^2.7.0
  hive_ce_flutter: ^2.1.0

  # AI Integration
  google_generative_ai: ^0.4.6

  # Image Picker
  image_picker: ^1.1.2

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_ce_generator: ^1.6.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
